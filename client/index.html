<!DOCTYPE html>
<html>
<head>
<title>Duck Arsenal 3D</title>
<style>
body { margin:0; overflow:hidden; background:#111; color:white; font-family:Arial; }
#menu {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center;
}
button {
  padding:15px 30px; font-size:20px; cursor:pointer;
}
#hud {
  position:absolute; top:10px; left:10px;
}
</style>
</head>
<body>

<div id="menu">
  <h1>🦆 Duck Arsenal 3D</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="hud" style="display:none;">
  <p>Health: <span id="hp">100</span></p>
  <p>Kills: <span id="kills">0</span></p>
  <p>Level: <span id="level">1</span></p>
  <p>XP: <span id="xp">0</span></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, bullets = [], enemies = [];
let keys = {};
let hp = 100, kills = 0, xp = 0, level = 1;
let gameStarted = false;

function startGame(){
  document.getElementById("menu").style.display = "none";
  document.getElementById("hud").style.display = "block";
  gameStarted = true;
  init();
  animate();
}

function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Light
  const light = new THREE.PointLight(0xffffff,1);
  light.position.set(10,10,10);
  scene.add(light);

  // Player (duck cube)
  const geo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshStandardMaterial({color:0xffff00});
  player = new THREE.Mesh(geo, mat);
  scene.add(player);

  camera.position.z = 5;

  spawnEnemies(5);

  window.addEventListener("keydown", e=>keys[e.key]=true);
  window.addEventListener("keyup", e=>keys[e.key]=false);
  window.addEventListener("click", shoot);
}

function spawnEnemies(count){
  for(let i=0;i<count;i++){
    let geo = new THREE.BoxGeometry(1,1,1);
    let mat = new THREE.MeshStandardMaterial({color:0xff0000});
    let enemy = new THREE.Mesh(geo, mat);
    enemy.position.x = Math.random()*20-10;
    enemy.position.z = Math.random()*-20;
    enemy.hp = 20;
    scene.add(enemy);
    enemies.push(enemy);
  }
}

function shoot(){
  let geo = new THREE.SphereGeometry(0.2);
  let mat = new THREE.MeshBasicMaterial({color:0xffffff});
  let bullet = new THREE.Mesh(geo, mat);

  bullet.position.copy(player.position);
  bullet.velocity = new THREE.Vector3(0,0,-1);
  scene.add(bullet);
  bullets.push(bullet);
}

function update(){
  // Movement
  if(keys["w"]) player.position.z -= 0.2;
  if(keys["s"]) player.position.z += 0.2;
  if(keys["a"]) player.position.x -= 0.2;
  if(keys["d"]) player.position.x += 0.2;

  // Bullets
  bullets.forEach((b,i)=>{
    b.position.add(b.velocity);

    enemies.forEach((e,ei)=>{
      if(b.position.distanceTo(e.position)<1){
        e.hp -= 10;
        scene.remove(b);
        bullets.splice(i,1);

        if(e.hp<=0){
          scene.remove(e);
          enemies.splice(ei,1);
          kills++;
          xp += 10;
          checkLevel();
        }
      }
    });
  });

  // Enemies chase player
  enemies.forEach(e=>{
    let dir = new THREE.Vector3().subVectors(player.position, e.position).normalize();
    e.position.add(dir.multiplyScalar(0.05));

    if(e.position.distanceTo(player.position)<1){
      hp -= 5;
    }
  });

  // Boss at level 80
  if(level === 80 && !window.boss){
    spawnBoss();
  }

  document.getElementById("hp").textContent = hp;
  document.getElementById("kills").textContent = kills;
  document.getElementById("xp").textContent = xp;
  document.getElementById("level").textContent = level;

  if(hp <= 0){
    alert("Game Over!");
    location.reload();
  }

  if(enemies.length === 0 && !window.boss){
    spawnEnemies(5 + level);
  }
}

function spawnBoss(){
  let geo = new THREE.BoxGeometry(5,5,5);
  let mat = new THREE.MeshStandardMaterial({color:0x00ff00});
  let boss = new THREE.Mesh(geo, mat);

  boss.hp = 10000;
  boss.position.z = -30;
  scene.add(boss);
  window.boss = boss;

  enemies.push(boss);
}

function checkLevel(){
  if(xp >= level * 50 && level < 80){
    xp = 0;
    level++;
    hp = 100;
  }
}

function animate(){
  requestAnimationFrame(animate);
  if(gameStarted) update();
  renderer.render(scene, camera);
}
</script>

</body>
</html>
