<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duck Arsenal 3D</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Minimal fallback in case style.css not loaded */
    body { margin:0; overflow:hidden; font-family: Arial, sans-serif; background:#111; color:white; }
  </style>
</head>
<body>

<!-- Menu -->
<div id="menu">
  <h1>🦆 Duck Arsenal 3D</h1>
  <button id="startBtn">START</button>
</div>

<!-- HUD -->
<div id="hud" style="display:none;">
  <p>Health: <span id="hp">100</span></p>
  <p>Kills: <span id="kills">0</span></p>
  <p>Level: <span id="level">1</span></p>
</div>

<!-- Crosshair -->
<div id="crosshair"></div>

<!-- Weapon HUD & Ability -->
<div id="weaponHUD"></div>
<div id="abilityBar"><div class="fill"></div></div>

<!-- Leaderboard -->
<div id="leaderboard"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<!-- Game script -->
<script>
// ------------------- GAME SCRIPT ------------------- //
let scene, camera, renderer;
let bullets=[], enemies=[];
let keys={};
let boss=null;
let battleRoyaleActive=false;
let starPlayer=null;

// Player object
let user={ mesh:null, hp:100, level:1, rapid:false, speed:0.2, currentWeapon:0, kills:0, abilityCooldown:0, abilityActive:false };
let players=[user];

// Weapons
const weapons=[
  {name:"Pistol", damage:10, rapid:false, color:0xffffff},
  {name:"Shotgun", damage:6, rapid:false, color:0xffaa00},
  {name:"Rifle", damage:20, rapid:true, color:0x00ff00},
  {name:"Sniper", damage:50, rapid:false, color:0xff00ff},
  {name:"Blaster", damage:15, rapid:true, color:0x00ffff}
];

// HUD elements
const weaponHUD=document.getElementById("weaponHUD");
const abilityBarFill=document.querySelector("#abilityBar .fill");
const leaderboard=document.getElementById("leaderboard");

// START BUTTON
document.getElementById("startBtn").onclick=startGame;

function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("hud").style.display="block";
  init();
  animate();
}

function init(){
  // Scene & camera
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87ceeb);
  camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.set(0,3,8);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Light
  const light=new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,5);
  scene.add(light);

  // Ground
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshStandardMaterial({color:0x228B22}));
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // Lake
  const lake=new THREE.Mesh(new THREE.CircleGeometry(10,32), new THREE.MeshStandardMaterial({color:0x1e90ff}));
  lake.rotation.x=-Math.PI/2;
  lake.position.set(0,0,-10);
  scene.add(lake);

  // Load player model (GLTF duck) if available
  const loader=new THREE.GLTFLoader();
  loader.load('models/duck.glb', gltf=>{
    user.mesh=gltf.scene;
    user.mesh.scale.set(0.5,0.5,0.5);
    user.mesh.position.set(0,0.5,0);
    scene.add(user.mesh);
  }, undefined, err=>{ console.warn("Duck model failed, using fallback cone."); fallbackPlayer(); });

  function fallbackPlayer(){
    const geom=new THREE.ConeGeometry(0.5,1,6);
    const mat=new THREE.MeshStandardMaterial({color:0xffff00});
    user.mesh=new THREE.Mesh(geom,mat);
    user.mesh.rotation.x=Math.PI/2;
    user.mesh.position.y=0.5;
    scene.add(user.mesh);
  }

  // AI Players
  for(let i=0;i<3;i++){
    const geom=new THREE.ConeGeometry(0.5,1,6);
    const mat=new THREE.MeshStandardMaterial({color:0xff00ff});
    const mesh=new THREE.Mesh(geom,mat);
    mesh.rotation.x=Math.PI/2;
    mesh.position.set(Math.random()*10-5,0.5,Math.random()*-10);
    scene.add(mesh);
    players.push({mesh:mesh,hp:100,level:1,rapid:false,speed:0.15,kills:0,currentWeapon:0});
  }

  // Enemies
  spawnEnemies(5);

  // Input
  window.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()]=true;
    if(["1","2","3","4","5"].includes(e.key)) user.currentWeapon=parseInt(e.key)-1;
  });
  window.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);
  window.addEventListener("click", shoot);
}

// --- Shooting ---
function shoot(){
  const weapon=weapons[user.currentWeapon];
  const shots=weapon.rapid?3:1;
  for(let i=0;i<shots;i++) spawnBullet(user.mesh.position.clone(),weapon.color,weapon.damage,user);
}

function spawnBullet(pos,color,damage,shooter){
  let b=new THREE.Mesh(new THREE.SphereGeometry(0.15,8,8), new THREE.MeshStandardMaterial({color}));
  b.position.copy(pos);
  b.velocity=new THREE.Vector3((Math.random()-0.5)*0.2,0,-1);
  b.damage=damage; b.shooter=shooter;
  scene.add(b); bullets.push(b);
}

// --- Enemies ---
function spawnEnemies(n){
  for(let i=0;i<n;i++){
    let e=new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xff0000}));
    e.position.set(Math.random()*20-10,0.5,Math.random()*-20);
    e.hp=20; scene.add(e); enemies.push(e);
  }
}

// --- Boss ---
function spawnBoss(){
  if(boss) return;
  boss=new THREE.Mesh(new THREE.CylinderGeometry(1,1,6,8), new THREE.MeshStandardMaterial({color:0x00ff00,emissive:0x00ff00,emissiveIntensity:0.5}));
  boss.position.set(0,3,-30); boss.hp=1000;
  scene.add(boss);
}

// --- HUD Update ---
function updateHUD(){
  const w=weapons[user.currentWeapon];
  weaponHUD.innerHTML=`<b>Weapon:</b> ${w.name} ${w.rapid?"(Rapid Fire)":""}`;
  abilityBarFill.style.width=`${Math.max(0,user.abilityCooldown/300*100)}%`;
  let html="<b>Leaderboard</b><br>";
  players.forEach((p,i)=>{html+=`Player ${i+1}: ${p.kills} kills ${p.hp>0?"🟢":"🔴"}<br>`;});
  leaderboard.innerHTML=html;
}

// --- Update Loop ---
function update(){
  if(!user.mesh) return; // wait for model

  // Movement
  if(keys["w"]) user.mesh.position.z-=user.speed;
  if(keys["s"]) user.mesh.position.z+=user.speed;
  if(keys["a"]) user.mesh.position.x-=user.speed;
  if(keys["d"]) user.mesh.position.x+=user.speed;

  // Bullets
  bullets.forEach((b,i)=>{
    b.position.add(b.velocity);
    players.forEach(p=>{
      if(p.hp>0 && p!==b.shooter && b.position.distanceTo(p.mesh.position)<0.7){
        p.hp-=b.damage; b.shooter.kills++; scene.remove(b); bullets.splice(i,1);
      }
    });
    enemies.forEach((e,ei)=>{
      if(b.position.distanceTo(e.position)<0.7){
        e.hp-=b.damage; scene.remove(b); bullets.splice(i,1);
        if(e.hp<=0){ scene.remove(e); enemies.splice(ei,1); }
      }
    });
    if(boss && b.position.distanceTo(boss.position)<2){
      boss.hp-=b.damage; b.shooter.kills++; scene.remove(b); bullets.splice(i,1);
      if(boss.hp<=0){ alert("👑 KING DUCK DEFEATED!"); battleRoyaleActive=true; }
    }
  });

  // Boss movement
  if(boss){ const dir=new THREE.Vector3().subVectors(user.mesh.position,boss.position).normalize(); boss.position.add(dir.multiplyScalar(0.02)); }

  // Battle Royale AI
  if(battleRoyaleActive){
    players.forEach(p=>{
      if(p.hp>0 && p!==user){
        const targets=players.filter(pl=>pl.hp>0 && pl!==p);
        if(targets.length>0){
          const t=targets[Math.floor(Math.random()*targets.length)];
          const dir=new THREE.Vector3().subVectors(t.mesh.position,p.mesh.position).normalize();
          p.mesh.position.add(dir.multiplyScalar(p.speed));
        }
      }
    });
    const alive=players.filter(p=>p.hp>0);
    if(alive.length===1 && !starPlayer){ starPlayer=alive[0]; alert(`🏆 Star Player: Player ${players.indexOf(starPlayer)+1}`); }
  }

  updateHUD();

  if(user.hp<=0){ alert("💀 Game Over"); location.reload(); }
}

// --- Animate ---
function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}
</script>
</body>
</html>
