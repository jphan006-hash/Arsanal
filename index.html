<!DOCTYPE html>
<html>
<head>
  <title>Duck Arsenal 3D</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial;
    }

    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      text-align: center;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      cursor: pointer;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="menu">
  <h1>🦆 Duck Arsenal 3D</h1>
  <button id="startBtn">START</button>
</div>

<div id="hud" style="display:none;">
  <p>Health: <span id="hp">100</span></p>
  <p>Kills: <span id="kills">0</span></p>
  <p>Level: <span id="level">1</span></p>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, bullets = [], enemies = [];
let keys = {};

let hp = 100;
let kills = 0;
let level = 1;

document.getElementById("startBtn").onclick = startGame;

function startGame(){
  document.getElementById("menu").style.display = "none";
  document.getElementById("hud").style.display = "block";

  init();
  animate();
}

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,5);
  scene.add(light);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x228B22})
  );
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -1;
  scene.add(ground);

  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffff00})
  );
  scene.add(player);

  spawnEnemies(5);

  window.addEventListener("keydown", e=>keys[e.key]=true);
  window.addEventListener("keyup", e=>keys[e.key]=false);
  window.addEventListener("click", shoot);
}

function shoot(){
  spawnBullet(0, -1, 10);
}

function spawnBullet(x,z,damage){
  let b = new THREE.Mesh(
    new THREE.SphereGeometry(0.2,8,8),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );

  b.position.copy(player.position);
  b.velocity = new THREE.Vector3(x,0,z);
  b.damage = damage;

  scene.add(b);
  bullets.push(b);
}

function spawnEnemies(n){
  for(let i=0;i<n;i++){
    let e = new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshStandardMaterial({color:0xff0000})
    );

    e.position.set(Math.random()*20-10,0,Math.random()*-20);
    e.hp = 20;

    scene.add(e);
    enemies.push(e);
  }
}

function update(){
  if(keys["w"]) player.position.z -= 0.2;
  if(keys["s"]) player.position.z += 0.2;
  if(keys["a"]) player.position.x -= 0.2;
  if(keys["d"]) player.position.x += 0.2;

  bullets.forEach((b,i)=>{
    b.position.add(b.velocity);

    enemies.forEach((e,ei)=>{
      if(b.position.distanceTo(e.position) < 1){
        e.hp -= b.damage;

        scene.remove(b);
        bullets.splice(i,1);

        if(e.hp <= 0){
          scene.remove(e);
          enemies.splice(ei,1);
          kills++;
        }
      }
    });
  });

  if(enemies.length === 0){
    spawnEnemies(5 + level);
    level++;
  }

  document.getElementById("hp").textContent = hp;
  document.getElementById("kills").textContent = kills;
  document.getElementById("level").textContent = level;
}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}
</script>

</body>
</html>
